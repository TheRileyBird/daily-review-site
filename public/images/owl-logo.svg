<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <radialGradient id="body" cx="38%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#C5A059"/>
      <stop offset="55%" stop-color="#B08C44"/>
      <stop offset="100%" stop-color="#7A6030"/>
    </radialGradient>
    <radialGradient id="chest" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#DEC695" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#DEC695" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eye-grad" cx="32%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#2A2518"/>
      <stop offset="100%" stop-color="#0E0D0B"/>
    </radialGradient>
  </defs>

  <!-- Body -->
  <ellipse cx="50" cy="68" rx="25" ry="28" fill="url(#body)"/>

  <!-- Head -->
  <circle cx="50" cy="38" r="23" fill="url(#body)"/>

  <!-- Ear tufts -->
  <polygon points="30,21 25,10 37,19" fill="#8D713B"/>
  <polygon points="70,21 75,10 63,19" fill="#8D713B"/>

  <!-- Facial disc (subtle warm oval) -->
  <ellipse cx="50" cy="40" rx="16" ry="14" fill="url(#chest)"/>

  <!-- Wing outlines (implied, not detailed) -->
  <path d="M27 58 C20 68 22 80 27 88" stroke="#7A6030" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
  <path d="M73 58 C80 68 78 80 73 88" stroke="#7A6030" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>

  <!-- Chest highlight -->
  <ellipse cx="50" cy="70" rx="13" ry="17" fill="#DEC695" opacity="0.22"/>

  <!-- === Eyes === -->
  <!-- Left eye — outer -->
  <circle cx="38" cy="37" r="8.5" fill="url(#eye-grad)"/>
  <!-- Right eye — outer -->
  <circle cx="62" cy="37" r="8.5" fill="url(#eye-grad)"/>

  <!-- Gold iris rings -->
  <circle cx="38" cy="37" r="8.5" stroke="#C5A059" stroke-width="1.4" fill="none"/>
  <circle cx="62" cy="37" r="8.5" stroke="#C5A059" stroke-width="1.4" fill="none"/>

  <!-- Pupils -->
  <circle cx="38" cy="37" r="4.5" fill="#0A0908"/>
  <circle cx="62" cy="37" r="4.5" fill="#0A0908"/>

  <!-- Eye shine -->
  <circle cx="40.5" cy="34.2" r="2.3" fill="rgba(255,255,255,.72)"/>
  <circle cx="64.5" cy="34.2" r="2.3" fill="rgba(255,255,255,.72)"/>

  <!-- Beak -->
  <polygon points="46.5,44 50,51 53.5,44" fill="#8D713B"/>

  <!-- Inner beak highlight -->
  <line x1="50" y1="44.5" x2="50" y2="49.5" stroke="#C5A059" stroke-width="0.8" opacity="0.6"/>
</svg>
